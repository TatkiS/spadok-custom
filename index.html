
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spadok Custom | Унікальні пісні та музика на замовлення</title>
    <style>
        /* Ваш поточний CSS без змін */
        :root {
            --bg-color: #121212;
            --text-color: #f5f5f5;
            --accent-color: #e63946;
            --card-bg: #1e1e1e;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }
        /* ... решта CSS залишається без змін ... */
        /* Додаємо тільки критичні стилі для плеєра */
        .audio-player { background: var(--card-bg); padding: 30px; border-radius: 15px; margin-bottom: 40px; text-align: center; }
        .playlist { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .playlist-item { background: var(--card-bg); padding: 20px; border-radius: 10px; cursor: pointer; }
        .play-btn { background: var(--accent-color); border: none; border-radius: 50%; width: 60px; height: 60px; font-size: 24px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <!-- Заголовок -->
    <header style="text-align: center; padding: 80px 20px;">
        <h1 style="font-size: 3rem; margin: 0; text-transform: uppercase; color: #e63946;">Spadok <span style="color: white;">Custom</span></h1>
        <p style="font-size: 1.2rem; color: #aaaaaa; max-width: 600px; margin: 20px auto;">Унікальні пісні на замовлення. Живий звук, професійне зведення.</p>
    </header>

    <!-- Портфоліо -->
    <section style="padding: 60px 20px; max-width: 1200px; margin: 0 auto;">
        <h2 style="text-align: center; font-size: 2rem; color: #e63946; border-bottom: 2px solid #e63946;">Наш звук (Портфоліо)</h2>

        <!-- Простіший плеєр для тестування -->
        <div style="background: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; margin-bottom: 40px;">
            <button id="playBtn" style="background: #e63946; border: none; border-radius: 50%; width: 60px; height: 60px; font-size: 24px; color: white; cursor: pointer; margin-right: 20px;">▶</button>
            <span id="currentTrack" style="font-size: 1.3rem; font-weight: bold;">Оберіть трек</span>
            <div id="progress" style="width: 300px; height: 6px; background: #444; border-radius: 3px; margin: 20px auto; cursor: pointer;">
                <div id="progressBar" style="background: #e63946; height: 100%; border-radius: 3px; width: 0%;"></div>
            </div>
        </div>

        <!-- Список треків -->
        <div id="playlist" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
        </div>
    </section>

    <!-- Решта контенту скорочено для тестування -->
    <section style="padding: 60px 20px; text-align: center;">
        <h2 style="color: #e63946;">Готові до свого хіта?</h2>
        <a href="https://t.me/SpadokCustom_bot" style="background: #e63946; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;">Написати в Telegram</a>
    </section>

    <script>
        const audio = new Audio();
        const tracks = [
            {
                title: "Без перемотки",
                file: "https://drive.google.com/uc?export=download&id=1pfn177CW6G3s_HrC47ISEH9Gd9mBuGQg"
            },
            {
                title: "Голос Вітру",
                file: "https://drive.google.com/uc?export=download&id=1FwPDocOO_LarR91GvSDmn8pxVhGY2go9"
            },
            {
                title: "Blood Pay",
                file: "https://drive.google.com/uc?export=download&id=1JWtFYIB-p1l7UJBRs_dTy9oU76ISVSvz"
            },
            {
                title: "Born of the Light",
                file: "https://drive.google.com/uc?export=download&id=12LDBQd90_GLQj_ISL_HomNRmIxhgkgRy"
            },
            {
                title: "Eternal Light",
                file: "https://drive.google.com/uc?export=download&id=1dN7hrhC04IOufY9nlUM9PuJZjyYLs5ab"
            },
            {
                title: "The Mask I Wear",
                file: "https://drive.google.com/uc?export=download&id=1_8_CAv1I50MLAd592PVdBcet5QGMzUqI"
            }
        ];

        let currentTrackIndex = 0;

        function initPlaylist() {
            const playlist = document.getElementById('playlist');
            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.style = "background: #1e1e1e; padding: 20px; border-radius: 10px; cursor: pointer; margin: 10px 0; border-left: 4px solid transparent;";
                item.innerHTML = `<div style="font-weight: bold; margin-bottom: 8px;">${track.title}</div>`;
                item.onclick = () => playTrack(index);
                playlist.appendChild(item);
            });
        }

        function playTrack(index) {
            currentTrackIndex = index;
            audio.src = tracks[index].file;
            document.getElementById('currentTrack').textContent = tracks[index].title;
            audio.play();
            document.getElementById('playBtn').textContent = '⏸';
        }

        document.getElementById('playBtn').onclick = function() {
            if (audio.paused) {
                audio.play();
                this.textContent = '⏸';
            } else {
                audio.pause();
                this.textContent = '▶';
            }
        };

        document.getElementById('progress').onclick = function(e) {
            const rect = this.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        };

        audio.ontimeupdate = function() {
            const progress = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        };

        window.onload = initPlaylist;
    </script>
</body>
</html>
